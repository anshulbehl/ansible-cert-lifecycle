---
- name: Renew a single IPA-issued certificate
  hosts: demo_host
  gather_facts: true

  tasks:
    - name: Execute IPA cert renewal
      ansible.builtin.include_role:
        name: cert_renew_ipa
      vars:
        cert_path: "{{ demo_certs_dir }}/{{ service_name }}/tls.crt"
        cert_key_path: "{{ demo_certs_dir }}/{{ service_name }}/tls.key"
