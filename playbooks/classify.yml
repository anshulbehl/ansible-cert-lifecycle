---
- name: Classify certificates using AI
  hosts: demo_host
  gather_facts: true

  pre_tasks:
    - name: Load scan results if not already in memory
      ansible.builtin.slurp:
        src: "{{ cert_scanner_output_dir | default('/tmp/cert-scan-results') }}/{{ inventory_hostname }}.json"
      register: scan_data
      when: cert_scan_report is not defined

    - name: Parse scan results
      ansible.builtin.set_fact:
        cert_scan_report: "{{ scan_data.content | b64decode | from_json }}"
      when: cert_scan_report is not defined

  roles:
    - cert_classifier

  post_tasks:
    - name: Report classification results to Mattermost
      ansible.builtin.include_role:
        name: cert_reporter
      vars:
        report_message: "{{ lookup('template', 'roles/cert_reporter/templates/classification_summary.j2') }}"
