---
- name: "Certificate Lifecycle Pipeline: Scan > Classify > Renew > Validate > Report"
  hosts: all
  gather_facts: true
  vars:
    cert_expiry_warning_days: 30
    cert_expiry_critical_days: 7
    mattermost_webhook_url: ""
    mattermost_channel: cert-lifecycle
    cert_scanner_output_dir: /tmp/cert-scan-results

  tasks:
    # Phase 1: Discovery
    - name: "PHASE 1: Scan all certificates"
      ansible.builtin.include_role:
        name: cert_scanner

    - name: Report scan results
      ansible.builtin.include_role:
        name: cert_reporter
      vars:
        report_message: |
          ### Certificate Scan Complete
          **Host:** {{ cert_scan_report.hostname }}
          **Total:** {{ cert_scan_report.total_certs }} certs, {{ cert_scan_report.expiring_soon }} expiring within {{ cert_expiry_warning_days }} days, {{ cert_scan_report.expired }} expired.

    # Phase 2: AI Classification
    - name: "PHASE 2: Classify certificates with AI ({{ llm_provider }})"
      ansible.builtin.include_role:
        name: cert_classifier

    - name: Report classification results
      ansible.builtin.include_role:
        name: cert_reporter
      vars:
        report_message: |
          ### AI Certificate Classification ({{ llm_provider }})
          {% for cert in cert_classifications %}
          **{{ cert.cert_id }}** - {{ cert.risk_level | upper }}
          > {{ cert.reason }}
          > Strategy: {{ cert.renewal_strategy }} | Approval: {{ cert.approval_type }}
          {% endfor %}

    # Phase 3: Map cert_ids to demo services
    - name: "PHASE 3: Map classifications to services"
      ansible.builtin.set_fact:
        service_map: >-
          {{
            service_map | default({}) | combine({
              item.name: item
            })
          }}
      loop: "{{ demo_services }}"

    - name: Match classifications to known services and skip unknowns
      ansible.builtin.set_fact:
        classified_certs: >-
          {{
            classified_certs | default([]) + ([{
              'cert_id': item.cert_id,
              'risk_level': item.risk_level,
              'renewal_strategy': item.renewal_strategy,
              'approval_type': item.approval_type,
              'service': (demo_services | selectattr('name', 'in', item.cert_id) | first)
            }] if (demo_services | selectattr('name', 'in', item.cert_id) | list | length > 0) else [])
          }}
      loop: "{{ cert_classifications }}"

    - name: Show matched certs
      ansible.builtin.debug:
        msg: "Matched {{ classified_certs | length }} certs to known services (skipped {{ cert_classifications | length - classified_certs | length }} unknown)"

    # Phase 3a: Auto-renew self-signed certs
    - name: "PHASE 3a: Auto-renew low-risk certificates"
      ansible.builtin.include_role:
        name: cert_renew_selfsigned
      vars:
        cert_id: "{{ item.cert_id }}"
        cert_cn: "{{ item.service.cert_cn | default(item.cert_id + '.certdemo.local') }}"
        cert_path: "{{ demo_certs_dir }}/{{ item.service.name }}/tls.crt"
        cert_key_path: "{{ demo_certs_dir }}/{{ item.service.name }}/tls.key"
        service_name: "{{ item.service.name }}"
      loop: "{{ classified_certs | selectattr('renewal_strategy', 'equalto', 'self-signed-regenerate') | list }}"
      loop_control:
        label: "{{ item.cert_id }} ({{ item.risk_level | upper }})"

    - name: Report low-risk renewals
      ansible.builtin.include_role:
        name: cert_reporter
      vars:
        report_message: |
          Auto-renewed {{ classified_certs | selectattr('renewal_strategy', 'equalto', 'self-signed-regenerate') | list | length }} low-risk certificates. No approval needed.

    # Phase 3b: Renew IPA certs
    - name: "PHASE 3b: Renew medium-risk certificates (IPA)"
      ansible.builtin.include_role:
        name: cert_renew_ipa
      vars:
        cert_id: "{{ item.cert_id }}"
        cert_cn: "{{ item.service.cert_cn | default(item.cert_id + '.certdemo.local') }}"
        cert_path: "{{ demo_certs_dir }}/{{ item.service.name }}/tls.crt"
        cert_key_path: "{{ demo_certs_dir }}/{{ item.service.name }}/tls.key"
        service_name: "{{ item.service.name }}"
      loop: "{{ classified_certs | selectattr('renewal_strategy', 'equalto', 'ipa-certmonger-renew') | list }}"
      loop_control:
        label: "{{ item.cert_id }} ({{ item.risk_level | upper }})"

    # Phase 3c: Renew keystore certs
    - name: "PHASE 3c: Renew critical certificates (Java Keystore)"
      ansible.builtin.include_role:
        name: cert_renew_keystore
      vars:
        cert_id: "{{ item.cert_id }}"
        cert_cn: "{{ item.service.cert_cn | default(item.cert_id + '.certdemo.local') }}"
        keystore_path: "{{ demo_keystores_dir }}/{{ item.service.name }}/keystore.jks"
        keystore_password: "{{ item.service.keystore_password | default('changeit') }}"
        keystore_alias: "{{ item.service.name }}"
        service_name: "{{ item.service.name }}"
        service_port: "{{ item.service.port | default('8443') }}"
      loop: "{{ classified_certs | selectattr('renewal_strategy', 'equalto', 'ipa-issue-keytool-import') | list }}"
      loop_control:
        label: "{{ item.cert_id }} ({{ item.risk_level | upper }})"

    # Phase 4: Validation
    - name: "PHASE 4: Validate all renewals"
      ansible.builtin.include_role:
        name: cert_validator
      vars:
        certs_to_validate: "{{ demo_services }}"

    # Phase 5: Final Report
    - name: "PHASE 5: Post final summary"
      ansible.builtin.include_role:
        name: cert_reporter
      vars:
        report_message: |
          ### Certificate Renewal Summary
          **Passed:** {{ validation_summary.passed }}/{{ validation_summary.total_validated }}
          {% for result in validation_summary.results %}
          - {{ result.cert_id }}: {{ result.status | upper }} {% if result.new_expiry is defined %}({{ result.new_expiry }}){% endif %}
          {% endfor %}
