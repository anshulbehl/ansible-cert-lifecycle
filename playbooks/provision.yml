---
- name: Provision EC2 instance for cert lifecycle demo
  hosts: localhost
  connection: local
  gather_facts: false
  tags:
    - ec2
  environment:
    AWS_PROFILE: "{{ aws_profile | default('mfa') }}"

  tasks:
    - name: Create security group
      amazon.aws.ec2_security_group:
        name: "{{ ec2_security_group }}"
        description: Cert lifecycle demo
        region: "{{ aws_region }}"
        rules:
          - proto: tcp
            ports: [22, 80, 443, 8000, 8080, 8088, 8443, 8444, 8445, 8446]
            cidr_ip: 0.0.0.0/0
        state: present
      register: sg

    - name: Launch EC2 instance
      amazon.aws.ec2_instance:
        name: "{{ ec2_instance_name }}"
        key_name: "{{ ec2_key_name }}"
        instance_type: "{{ ec2_instance_type }}"
        image_id: "{{ ec2_ami }}"
        region: "{{ aws_region }}"
        security_group: "{{ sg.group_id }}"
        tags:
          Owner: "{{ ec2_owner_tag | default('abehl') }}"
        volumes:
          - device_name: /dev/sda1
            ebs:
              volume_size: "{{ ec2_volume_size }}"
              volume_type: gp3
        wait: true
        state: running
      register: ec2

    - name: Add host to inventory
      ansible.builtin.add_host:
        name: cert-demo
        ansible_host: "{{ ec2.instances[0].public_ip_address }}"
        ansible_user: ec2-user
        ansible_ssh_private_key_file: "~/.ssh/{{ ec2_key_name }}.pem"
        groups: demo_host

    - name: Wait for SSH
      ansible.builtin.wait_for:
        host: "{{ ec2.instances[0].public_ip_address }}"
        port: 22
        delay: 10
        timeout: 300

    - name: Display instance info
      ansible.builtin.debug:
        msg: "EC2 instance {{ ec2_instance_name }} running at {{ ec2.instances[0].public_ip_address }}"

- name: Configure demo environment on EC2
  hosts: demo_host
  become: true
  gather_facts: true
  tags:
    - demo

  roles:
    - provision_demo

- name: Configure AAP (credentials, project, inventory, job templates, workflow, EDA)
  hosts: localhost
  connection: local
  gather_facts: false
  tags:
    - aap

  pre_tasks:
    - name: Set EC2 public IP for AAP inventory
      ansible.builtin.set_fact:
        ec2_public_ip: "{{ hostvars['cert-demo']['ansible_host'] | default('127.0.0.1') }}"

  roles:
    - provision_aap
