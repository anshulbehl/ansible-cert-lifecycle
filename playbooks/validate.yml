---
- name: Validate certificate renewals
  hosts: all
  gather_facts: true

  pre_tasks:
    - name: Build list of certs to validate from demo_services
      ansible.builtin.set_fact:
        certs_to_validate: >-
          {{ demo_services | map('combine', {'hostname': inventory_hostname}) | list }}

  roles:
    - cert_validator

  post_tasks:
    - name: Report validation results
      ansible.builtin.include_role:
        name: cert_reporter
      vars:
        report_message: |
          ### Certificate Renewal Validation
          **Passed:** {{ validation_summary.passed }}/{{ validation_summary.total_validated }}
          {% for result in validation_summary.results %}
          - {{ result.cert_id }}: {{ result.status | upper }} {% if result.new_expiry is defined %}(expires {{ result.new_expiry }}){% endif %}
          {% endfor %}
