---
- name: Validate certificate renewals
  hosts: demo_host
  gather_facts: true

  pre_tasks:
    - name: Build list of certs to validate from demo_services
      ansible.builtin.set_fact:
        certs_to_validate: >-
          {{ demo_services | map('combine', {'hostname': inventory_hostname}) | list }}

  roles:
    - cert_validator

  post_tasks:
    - name: Report validation results to Mattermost
      ansible.builtin.include_role:
        name: cert_reporter
      vars:
        report_message: "{{ lookup('template', 'roles/cert_reporter/templates/final_summary.j2') }}"
