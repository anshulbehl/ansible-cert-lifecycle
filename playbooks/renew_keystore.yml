---
- name: Renew a single Java keystore certificate
  hosts: all
  gather_facts: true

  tasks:
    - name: Execute keystore cert renewal
      ansible.builtin.include_role:
        name: cert_renew_keystore
      vars:
        keystore_path: "{{ demo_keystores_dir }}/{{ service_name }}/keystore.jks"
        keystore_password: "{{ vault_keystore_password | default('changeit') }}"
        keystore_alias: "{{ service_name }}"
