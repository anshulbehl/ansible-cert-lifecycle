---
- name: Certificate Expiry Event Handler
  hosts: all
  sources:
    - ansible.eda.webhook:
        host: 0.0.0.0
        port: 5000

  rules:
    - name: Splunk ITSI cert expiry alert
      condition: event.payload.source == "splunk_itsi" and event.payload.kpi is match("cert_expiry.*")
      action:
        run_job_template:
          name: "Certificate Lifecycle Pipeline"
          organization: "Default"
          job_args:
            extra_vars:
              trigger_source: splunk
              trigger_host: "{{ event.payload.host }}"
              trigger_severity: "{{ event.payload.severity }}"
              splunk_episode_id: "{{ event.payload.episode_id | default('') }}"

    - name: Splunk ES TLS failure alert
      condition: event.payload.source == "splunk_es" and event.payload.search_name is match(".*tls.*|.*ssl.*|.*certificate.*")
      action:
        run_job_template:
          name: "Cert Discovery Scanner"
          organization: "Default"
          job_args:
            extra_vars:
              trigger_source: splunk_es
              trigger_host: "{{ event.payload.host }}"

    - name: Scheduled cert scan trigger
      condition: event.payload.source == "scheduled" and event.payload.action == "scan"
      action:
        run_job_template:
          name: "Cert Discovery Scanner"
          organization: "Default"

    - name: Manual pipeline trigger
      condition: event.payload.source == "manual" and event.payload.action == "full_pipeline"
      action:
        run_job_template:
          name: "Certificate Lifecycle Pipeline"
          organization: "Default"
          job_args:
            extra_vars:
              trigger_source: manual

    - name: Dashboard invalidate trigger
      condition: event.payload.source == "dashboard"
      action:
        run_job_template:
          name: "Certificate Lifecycle Full Pipeline"
          organization: "Default"
          job_args:
            extra_vars:
              trigger_source: dashboard
              trigger_service: "{{ event.payload.service | default('all') }}"
