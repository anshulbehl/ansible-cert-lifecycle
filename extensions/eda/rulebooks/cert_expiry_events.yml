---
- name: Certificate Expiry Event Handler
  hosts: all
  sources:
    - ansible.eda.webhook:
        host: 0.0.0.0
        port: 5002
      filters:
        - ansible.eda.json_filter:
            exclude_keys: []

  rules:
    - name: Splunk cert expiry alert
      condition: event.payload.source is defined and event.payload.source == "splunk_itsi"
      action:
        run_job_template:
          name: "Certificate Lifecycle Full Pipeline"
          organization: "Default"
          job_args:
            extra_vars:
              trigger_source: splunk

    - name: Dashboard trigger
      condition: event.payload.source is defined and event.payload.source == "dashboard"
      action:
        run_job_template:
          name: "Certificate Lifecycle Full Pipeline"
          organization: "Default"
          job_args:
            extra_vars:
              trigger_source: dashboard

    - name: Any cert event
      condition: event.payload.status is defined and event.payload.status == "expired"
      action:
        run_job_template:
          name: "Certificate Lifecycle Full Pipeline"
          organization: "Default"
          job_args:
            extra_vars:
              trigger_source: event_stream
