---
- name: Find Java keystore files
  ansible.builtin.find:
    paths: "{{ cert_scanner_keystore_paths }}"
    patterns: "{{ cert_scanner_keystore_extensions | map('regex_replace', '^(.*)$', '*.\\1') | list }}"
    recurse: true
  register: keystore_files
  become: true
  ignore_errors: true

- name: Read keystore entries
  ansible.builtin.shell:
    cmd: |
      keytool -list -v \
        -keystore "{{ item.path }}" \
        -storepass "{{ cert_scanner_keystore_password }}" \
        -storetype {{ 'PKCS12' if item.path.endswith('.p12') or item.path.endswith('.pfx') else 'JKS' }} \
        2>/dev/null \
      | grep -E '(Alias name|Valid from|Owner|Issuer|Serial number)' \
      | tr '\n' '|'
  register: keystore_details_raw
  loop: "{{ keystore_files.files | default([]) }}"
  changed_when: false
  failed_when: false
  become: true

- name: Extract cert expiry from keystores
  ansible.builtin.shell:
    cmd: |
      keytool -list -v \
        -keystore "{{ item.path }}" \
        -storepass "{{ cert_scanner_keystore_password }}" \
        -storetype {{ 'PKCS12' if item.path.endswith('.p12') or item.path.endswith('.pfx') else 'JKS' }} \
        2>/dev/null \
      | grep -A1 'Valid from' \
      | grep 'until' \
      | head -1 \
      | sed 's/.*until: //'
  register: keystore_expiry_raw
  loop: "{{ keystore_files.files | default([]) }}"
  changed_when: false
  failed_when: false
  become: true

- name: Parse keystore details into structured data
  ansible.builtin.set_fact:
    keystore_certs_found: >-
      {{
        keystore_certs_found | default([]) + [{
          'path': item.item.path,
          'subject': (item.stdout | regex_search('Owner:\s*(.+?)(\||$)', '\1') | first | default('unknown') | trim),
          'issuer': (item.stdout | regex_search('Issuer:\s*(.+?)(\||$)', '\1') | first | default('unknown') | trim),
          'alias': (item.stdout | regex_search('Alias name:\s*(.+?)(\||$)', '\1') | first | default('unknown') | trim),
          'not_after': (keystore_expiry_raw.results[idx].stdout | default('unknown') | trim),
          'days_remaining': (((keystore_expiry_raw.results[idx].stdout | default(ansible_date_time.date) | trim | to_datetime('%a %b %d %H:%M:%S %Z %Y')) - (ansible_date_time.iso8601 | to_datetime('%Y-%m-%dT%H:%M:%SZ'))).days) | default(0),
          'type': item.item.path | regex_search('\\.([^.]+)$', '\1') | first | default('jks'),
          'store': 'java-keystore',
          'service': (item.item.path | regex_search('/([^/]+)/keystore', '\1') | first | default('unknown')),
          'is_self_signed': false,
          'hostname': inventory_hostname
        }]
      }}
  loop: "{{ keystore_details_raw.results }}"
  loop_control:
    index_var: idx
  when: item.rc == 0 and item.stdout | length > 0
