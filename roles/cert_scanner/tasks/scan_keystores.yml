---
- name: Find Java keystore files
  ansible.builtin.find:
    paths: "{{ cert_scanner_keystore_paths }}"
    patterns: "{{ cert_scanner_keystore_extensions | map('regex_replace', '^(.*)$', '*.\\1') | list }}"
    recurse: true
  register: keystore_files
  become: true
  ignore_errors: true

- name: Read keystore certificate details as JSON
  ansible.builtin.shell:
    cmd: |
      python3 -c "
      import subprocess, json, re, sys
      from datetime import datetime, timezone

      ks_file = '{{ item.path }}'
      ks_pass = '{{ cert_scanner_keystore_password }}'
      ks_type = 'PKCS12' if ks_file.endswith(('.p12', '.pfx')) else 'JKS'

      result = subprocess.run(
          ['keytool', '-list', '-v', '-keystore', ks_file,
           '-storepass', ks_pass, '-storetype', ks_type],
          capture_output=True, text=True
      )
      if result.returncode != 0:
          sys.exit(0)

      output = result.stdout

      # Extract alias
      alias_match = re.search(r'Alias name:\s*(.+)', output)
      alias = alias_match.group(1).strip() if alias_match else 'unknown'

      # Extract owner/subject
      owner_match = re.search(r'Owner:\s*(.+)', output)
      subject = owner_match.group(1).strip() if owner_match else 'unknown'

      # Extract issuer
      issuer_match = re.search(r'Issuer:\s*(.+)', output)
      issuer = issuer_match.group(1).strip() if issuer_match else 'unknown'

      # Extract expiry from 'Valid from: ... until: ...'
      until_match = re.search(r'until:\s*(.+)', output)
      not_after = until_match.group(1).strip() if until_match else ''

      try:
          expiry = datetime.strptime(not_after, '%a %b %d %H:%M:%S %Z %Y').replace(tzinfo=timezone.utc)
          days = (expiry - datetime.now(timezone.utc)).days
      except:
          days = -1

      # Extract service from path
      svc_match = re.search(r'/([^/]+)/keystore', ks_file)
      service = svc_match.group(1) if svc_match else 'unknown'

      print(json.dumps({
          'path': ks_file,
          'alias': alias,
          'subject': subject,
          'issuer': issuer,
          'not_after': not_after,
          'days_remaining': days,
          'type': ks_type.lower(),
          'store': 'java-keystore',
          'service': service,
          'is_self_signed': False,
          'hostname': '{{ inventory_hostname }}'
      }))
      "
  register: keystore_details_raw
  loop: "{{ keystore_files.files | default([]) }}"
  changed_when: false
  failed_when: false
  become: true

- name: Build keystore certs list
  ansible.builtin.set_fact:
    keystore_certs_found: "{{ keystore_certs_found | default([]) + [item.stdout | from_json] }}"
  loop: "{{ keystore_details_raw.results }}"
  when: item.stdout | default('') | length > 2
