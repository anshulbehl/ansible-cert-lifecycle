---
- name: Ensure output directory exists
  ansible.builtin.file:
    path: "{{ cert_scanner_output_dir }}"
    state: directory
    mode: "0755"
  become: true

- name: Find PEM certificate files
  ansible.builtin.find:
    paths:
      - "{{ demo_certs_dir | default('/opt/cert-demo/certs') }}"
      - /etc/pki/tls/certs
    patterns: "*.crt,*.pem"
    recurse: true
  register: pem_files
  become: true
  ignore_errors: true

- name: Read certificate details as JSON
  ansible.builtin.shell:
    cmd: |
      python3 -c "
      import subprocess, json, sys
      from datetime import datetime, timezone

      cert_file = '{{ item.path }}'
      result = subprocess.run(
          ['openssl', 'x509', '-in', cert_file, '-noout',
           '-subject', '-issuer', '-enddate', '-startdate', '-serial'],
          capture_output=True, text=True
      )
      if result.returncode != 0:
          sys.exit(0)

      lines = {}
      for line in result.stdout.strip().split('\n'):
          key, _, val = line.partition('=')
          lines[key.strip()] = val.strip()

      not_after = lines.get('notAfter', '')
      try:
          expiry = datetime.strptime(not_after, '%b %d %H:%M:%S %Y %Z').replace(tzinfo=timezone.utc)
          days = (expiry - datetime.now(timezone.utc)).days
      except:
          days = -1

      subject = lines.get('subject', 'unknown')
      issuer = lines.get('issuer', 'unknown')

      # Extract service name from path
      import re
      svc_match = re.search(r'/([^/]+)/tls\.crt$', cert_file)
      service = svc_match.group(1) if svc_match else 'unknown'

      print(json.dumps({
          'path': cert_file,
          'subject': subject,
          'issuer': issuer,
          'not_after': not_after,
          'days_remaining': days,
          'serial': lines.get('serial', 'unknown'),
          'type': 'pem',
          'store': 'filesystem',
          'service': service,
          'is_self_signed': subject == issuer,
          'hostname': '{{ inventory_hostname }}'
      }))
      "
  register: cert_details_raw
  loop: "{{ pem_files.files | default([]) }}"
  changed_when: false
  failed_when: false
  become: true

- name: Build web certs list
  ansible.builtin.set_fact:
    web_certs_found: "{{ web_certs_found | default([]) + [item.stdout | from_json] }}"
  loop: "{{ cert_details_raw.results }}"
  when: item.stdout | default('') | length > 2
