---
- name: "{{ cert.service }} - Verify keystore entry updated"
  ansible.builtin.shell:
    cmd: |
      keytool -list -v \
        -keystore "{{ cert.path }}" \
        -storepass "{{ cert.keystore_password | default('changeit') }}" \
        2>/dev/null \
      | grep -A2 'Valid from' | grep 'until' | head -1 | sed 's/.*until: //'
  register: keystore_expiry
  changed_when: false
  failed_when: false
  become: true

- name: "{{ cert.service }} - Check application HTTPS endpoint"
  ansible.builtin.uri:
    url: "https://localhost:{{ cert.port | default('8443') }}/health"
    validate_certs: false
    status_code: 200
    timeout: "{{ cert_validator_timeout }}"
  register: app_health
  ignore_errors: true

- name: "{{ cert.service }} - TLS handshake on app port"
  ansible.builtin.shell:
    cmd: |
      echo | openssl s_client -connect localhost:{{ cert.port | default('8443') }} 2>/dev/null \
      | openssl x509 -noout -enddate 2>/dev/null
  register: app_tls
  changed_when: false
  failed_when: false
  become: true

- name: "{{ cert.service }} - Record keystore validation result"
  ansible.builtin.set_fact:
    validation_results: >-
      {{ validation_results | default([]) + [{
        'cert_id': cert.service | default(cert.path),
        'type': 'java-keystore',
        'keystore_updated': keystore_expiry.rc == 0,
        'tls_handshake': app_tls.rc == 0,
        'health_check': app_health.status | default(0) == 200,
        'new_expiry': keystore_expiry.stdout | default('unknown'),
        'status': (keystore_expiry.rc == 0 and app_tls.rc == 0 and (app_health.status | default(0)) == 200) | ternary('pass', 'fail'),
        'reason': (keystore_expiry.rc != 0) | ternary('Keystore not updated', (app_tls.rc != 0) | ternary('TLS handshake failed', ((app_health.status | default(0)) != 200) | ternary('Health check failed', '')))
      }] }}
