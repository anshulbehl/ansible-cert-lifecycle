---
- name: "{{ cert.name }} - Check application HTTPS endpoint"
  ansible.builtin.uri:
    url: "https://localhost:{{ cert.port }}/health"
    validate_certs: false
    status_code: 200
    timeout: "{{ cert_validator_timeout }}"
  register: app_health
  ignore_errors: true

- name: "{{ cert.name }} - TLS handshake on app port"
  ansible.builtin.shell:
    cmd: |
      echo | openssl s_client -connect localhost:{{ cert.port }} 2>/dev/null \
      | openssl x509 -noout -enddate 2>/dev/null | sed 's/notAfter=//'
  register: app_tls
  changed_when: false
  failed_when: false
  become: true

- name: "{{ cert.name }} - Record keystore validation result"
  ansible.builtin.set_fact:
    validation_results: >-
      {{ validation_results | default([]) + [{
        'cert_id': cert.name,
        'type': 'java-keystore',
        'tls_handshake': app_tls.rc == 0,
        'health_check': app_health.status | default(0) == 200,
        'new_expiry': app_tls.stdout | default('unknown'),
        'status': (app_tls.rc == 0 and (app_health.status | default(0)) == 200) | ternary('pass', 'fail'),
        'reason': (app_tls.rc != 0) | ternary('TLS handshake failed', ((app_health.status | default(0)) != 200) | ternary('Health check failed', ''))
      }] }}
