---
- name: Create machine credential for demo hosts
  ansible.controller.credential:
    name: Cert Demo Machine
    description: SSH credential for cert demo hosts
    organization: "{{ aap_organization }}"
    credential_type: Machine
    inputs:
      username: ec2-user
      ssh_key_data: "{{ lookup('file', '~/.ssh/' + ec2_key_name + '.pem') }}"
    state: present
    controller_host: "{{ aap_host }}"
    controller_username: "{{ aap_username }}"
    controller_password: "{{ aap_password }}"
    validate_certs: "{{ aap_validate_certs }}"

- name: Create custom credential type for LLM API
  ansible.controller.credential_type:
    name: LLM API Credential
    description: API credentials for LLM endpoints (Granite, Claude, Gemini)
    kind: cloud
    inputs:
      fields:
        - id: llm_endpoint
          type: string
          label: LLM API Endpoint
        - id: llm_api_key
          type: string
          label: LLM API Key
          secret: true
        - id: llm_model
          type: string
          label: Model Name
      required:
        - llm_endpoint
    injectors:
      extra_vars:
        llm_endpoint_url: "{% raw %}{{ llm_endpoint }}{% endraw %}"
        llm_api_key_value: "{% raw %}{{ llm_api_key }}{% endraw %}"
        llm_model_name: "{% raw %}{{ llm_model }}{% endraw %}"
    state: present
    controller_host: "{{ aap_host }}"
    controller_username: "{{ aap_username }}"
    controller_password: "{{ aap_password }}"
    validate_certs: "{{ aap_validate_certs }}"

- name: Create LLM credential
  ansible.controller.credential:
    name: "LLM - {{ llm_provider | capitalize }}"
    description: "API credential for {{ llm_provider }} model"
    organization: "{{ aap_organization }}"
    credential_type: LLM API Credential
    inputs:
      llm_endpoint: "{{ lookup('vars', llm_provider + '_endpoint') }}"
      llm_api_key: "{{ lookup('vars', llm_provider + '_api_key', default='') }}"
      llm_model: "{{ lookup('vars', llm_provider + '_model', default='') }}"
    state: present
    controller_host: "{{ aap_host }}"
    controller_username: "{{ aap_username }}"
    controller_password: "{{ aap_password }}"
    validate_certs: "{{ aap_validate_certs }}"

- name: Create custom credential type for Mattermost
  ansible.controller.credential_type:
    name: Mattermost Webhook
    description: Mattermost incoming webhook URL
    kind: cloud
    inputs:
      fields:
        - id: webhook_url
          type: string
          label: Webhook URL
          secret: true
      required:
        - webhook_url
    injectors:
      extra_vars:
        mattermost_webhook_url: "{% raw %}{{ webhook_url }}{% endraw %}"
    state: present
    controller_host: "{{ aap_host }}"
    controller_username: "{{ aap_username }}"
    controller_password: "{{ aap_password }}"
    validate_certs: "{{ aap_validate_certs }}"

- name: Create Mattermost credential
  ansible.controller.credential:
    name: Mattermost Cert Lifecycle
    description: Webhook for cert lifecycle notifications
    organization: "{{ aap_organization }}"
    credential_type: Mattermost Webhook
    inputs:
      webhook_url: "{{ mattermost_webhook_url }}"
    state: present
    controller_host: "{{ aap_host }}"
    controller_username: "{{ aap_username }}"
    controller_password: "{{ aap_password }}"
    validate_certs: "{{ aap_validate_certs }}"
  when: mattermost_webhook_url | length > 0
